site_name: CTF-Web修炼手册
site_description: Web安全学习笔记，包含SQL注入、XSS、CSRF等常见漏洞的学习记录
site_author: l
site_url: https://github.com/lamaper/

# GitHub 仓库链接
repo_url: https://github.com/lamaper/CTF-mind
repo_name: lamaper/CTF-mind

# 文档目录
docs_dir: md_docs
site_dir: docs

theme:
  name: material
  language: zh
  icon:
    logo: material/shield-check
    favicon: material/shield-check
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  font:
    text: Noto Sans SC
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - content.code.annotate
    - content.tooltips

extra_css:
  - stylesheets/extra.css

nav:
  - 首页: index.md
  - 基础知识:
    - HTTP状态码: http状态码.md
    - HTTP请求与响应样例: http请求与响应样例.md
    - Content-Type: content-type.md
  - SQL注入:
      - MySQL系统表说明: Mysql系统表说明.md
      - MySQL新手必备关键词手册: MySQL新手必备关键词手册.md
      - SQL注入关键词: SQL注入中的关键词.md
      - 基础SQL注入语句: 基础SQL注入语句大全.md
      - SQL注入漏洞判断与类型分析: SQL注入漏洞判断与类型分析.md
      - 如何判断SQL注入点: 如何判断SQL注入点.md
      - SQL注入完整攻击流程: SQL注入完整攻击流程图.md
      - SQL报错注入详解: SQL 报错注入详解.md
      - 布尔盲注原理: bool盲注原理.md
      - 布尔盲注过程: bool盲注过程.md
      - 布尔盲注语句参考: bool盲注语句参考.md
      - SQLi-labs Less-1: 普通注入SQLi_lab Less-1.md
      - Sqlmap使用手册: sqlmap使用手册.md
      - Sqlmap使用-Less1: Sqlmap-less1.md
      - Sqlmap使用-Less8: Sqlmap-less8.md
      - Sqlmap使用-Less10: Sqlmap-less10.md
  - XSS:
      - XSS 完全指南: xss_guide.md
  - PHP安全:
    - PHP反序列化:
      - PHP反序列化介绍: php反序列化介绍.md
      - PHP反序列化造链法: php反序列化造链法.md
      - PHP反序列化类名爆破: php反序列化类名爆破.md
      - PHP生成反序列脚本: php生成反序列脚本.md
    - PHP绕过技巧:
      - Bash空格绕过技巧: bash空格绕过技巧.md
      - preg_match空格检测绕过策略: preg_match 空格检测绕过策略.md
  # - Python安全:

  # - Node.js安全:

  # - Go安全:

  # - Java安全:

  - Linux安全:
    - SUID提权: SUID提权.md

  # - 前沿CVE漏洞分析:

  - CTF工具使用手册:
    - 信息收集与扫描:
      - Amass使用手册: amass使用手册.md
      - Nmap使用手册: nmap使用手册.md
      - Dirsearch使用手册: dirsearch使用手册.md
      - FFUF使用手册: ffuf使用手册.md
      - Gobuster使用指南: gobuster_使用指南.md
      - Gobuster使用手册: gobuster使用手册.md
      - DNSRecon使用手册: dnsrecon使用手册.md
      - Dig使用详尽手册: dig_使用详尽手册.md
      - Wireshark使用手册: Wireshark使用手册.md
      - Pyshark使用手册: pyshark使用手册.md
      - SecLists字典分类详解: SecLists字典分类详解.md
      - CTF Fuzzing Tools: CTF_Fuzzing_Tools.md
    - Git泄漏与代码审计:
      - Git工具大全: Git工具大全.md
      - Git-Dumper使用手册: git-dumper使用手册.md
      - GitHacker使用手册: GitHacker使用手册.md
